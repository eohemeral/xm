server:
  port: 9095
  servlet:
    context-path: /api
  tomcat:
    uri-encoding: UTF-8 # 新增：解决中文参数乱码

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/springboot-vue?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml # 保持你的路径（若xml在子目录，改为mapper/**/*.xml）
  type-aliases-package: com.example.springboot.entity
  configuration:
    map-underscore-to-camel-case: true # 新增：下划线转驼峰（数据库字段→实体类属性）

logging:
  level:
    com.example.springboot.mapper: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n" # 新增：日志格式化